<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my world </title>
    <style>
        /* إضافة للميزات: الماوس، الخطوط، وتأثيرات النجوم */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; cursor: crosshair; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* ميزة: شاشة الترحيب */
        #gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); z-index: 100; display: flex; justify-content: center; align-items: center; color: white; flex-direction: column; transition: 0.8s; }
        .gate-btn { background: rgba(255,255,255,0.2); border: 1px solid white; padding: 15px 30px; margin: 10px; border-radius: 20px; cursor: pointer; color: white; font-size: 1.2em; transition: 0.3s; }
        .gate-btn:hover { background: #ffb7c5; }


        .main-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; opacity: 0; transition: 2s; }
        
        .card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); padding: 30px; border-radius: 35px; text-align: center; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.2); color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }


        .potho-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ffb7c5; object-fit: cover; margin-bottom: 15px; transition: 0.5s; }
        .potho-img:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 0 15px #ffb7c5; }
        
        .btn { display: block; background: rgba(255, 255, 255, 0.1); margin: 10px 0; padding: 12px; border-radius: 15px; text-decoration: none; color: white; font-weight: bold; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.03); }


        .audio-section { margin: 20px 0; }
        .stats { margin-top: 15px; font-size: 0.8em; color: #eee; }
    </style>
</head>
<body>


    <div id="gate">
        <h1 id="typewriter">أهلاً بك في عالمي 🙈</h1>
        <p>اختر جنسك للمتابعة:</p>
        <div>
            <button class="gate-btn" onclick="enterSite('boy')">ولد 🧸</button>
            <button class="gate-btn" onclick="enterSite('girl')">بنت 🎀</button>
        </div>
    </div>

   <video autoplay muted loop playsinline class="video-bg">
    <source src="Pinterest.mp4" type="video/mp4">
</video>


    <div class="main-container" id="main">
        <div class="card">
            <img src="potho.jpg" alt="Profile" class="potho-img">
            <h2 style="margin: 0;">Welcome to my house </h2>
            <p style="font-size: 0.9em; opacity: 0.8;">My Personal Space 🪐 </p>
                        <p style="font-size: 1.0em; opacity: 0.8;">The beta version is still under development ☄️ </p>


            <div class="links">
                <a href="https://discord.com/users/1493548087191404595" class="btn">Discord 🎮</a>
                <a href="https://open.spotify.com/user/31wpfbk75umnv4ri3yb2mavess4i?si=ce51e02b9ae44f9d" class="btn">Spotify 🎵</a>
                <a href="https://steamcommunity.com/profiles/76561199515284992/" class="btn">Steam 🕹️</a>
                <a href="https://www.roblox.com/ar/users/2727167537/profile" class="btn">Roblox (Main) 🎲</a>
                <a href="https://www.roblox.com/users/4120487148/profile" class="btn">Roblox (Alt) 🎲</a>
            </div>


            <img src="5051.gif" alt="Gallery" style="width: 100%; border-radius: 15px; margin: 15px 0;">


            <div class="audio-section">
                <audio controls style="width: 100%; border-radius: 10px;">
                    <source src="505.mp3" type="audio/mpeg">
                </audio>
            </div>


            <div class="stats">
                <p>إجمالي الزوار:</p>
                <a href="https://hits.seeyoufarm.com" target="_blank">
                    <a src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgithub.com%2FYOUR_USER%2FYOUR_REPO&count_bg=%23FFB7C5" alt="Hits">
                </a>
                <p>⭐أنت الزائر رقم:⭐ <span id="visit-count" style="font-size: 1.2em; color: #ffb7c5;">0</span></p>
                                <p>جميع حقوق محفوظه لي u_491 <span id="visit-count" style="font-size: 1.2em; color: #0066ff;"></span></p>


            </div>
        </div>
    </div>


    <script>
        function enterSite(gender) {
            document.getElementById('gate').style.opacity = '0';
            setTimeout(() => { document.getElementById('gate').style.display = 'none'; document.getElementById('main').style.opacity = '1'; }, 800);
            document.querySelector('audio').play(); // ميزة: تشغيل تلقائي بعد التفاعل
        }
        let count = localStorage.getItem('visit_id') || 0;
        let display = document.getElementById('visit-count');
        let finalCount = parseInt(count) + 1;
        let current = 0;
        let timer = setInterval(() => { display.innerText = current; if(current >= finalCount) clearInterval(timer); current++; }, 50);
        localStorage.setItem('visit_id', finalCount);
    </script>
</body>
</html>
